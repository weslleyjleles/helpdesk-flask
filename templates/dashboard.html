<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard de Chamados</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      .chart-container {
        position: relative;
        margin: auto;
        height: 300px;
        width: 100%;
      }
      .card {
        border-radius: 15px;
      }
      .card-header {
        font-weight: bold;
        border-radius: 15px 15px 0 0 !important;
      }
    </style>
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4 shadow">
      <div class="container">
        <span class="navbar-brand">HelpDesk - Estatísticas</span>
        <a
          href="{{ url_for('painel_admin') }}"
          class="btn btn-outline-light btn-sm"
          >Voltar ao Painel</a
        >
      </div>
    </nav>

    <div class="container">
      <div class="row">
        <div class="col-md-5 mb-4">
          <div class="card shadow border-0">
            <div class="card-header bg-primary text-white">
              Status dos Chamados
            </div>
            <div class="card-body">
              <div class="chart-container">
                <canvas id="chartStatus"></canvas>
              </div>
            </div>
          </div>
        </div>

        <div class="col-md-7 mb-4">
          <div class="card shadow border-0">
            <div class="card-header bg-success text-white">
              Volume Mensal (Geral)
            </div>
            <div class="card-body">
              <div class="chart-container">
                <canvas id="chartMensal"></canvas>
              </div>
            </div>
          </div>
        </div>

        <div class="col-12 mb-4">
          <div class="card shadow border-0">
            <div class="card-header bg-dark text-white">Demandas por Setor</div>
            <div class="card-body">
              <div class="chart-container" style="height: 400px">
                <canvas id="chartSetores"></canvas>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // --- 1. CONFIGURAÇÃO GRÁFICO DE STATUS ---
      const statusData = {{ status_counts | tojson }};
      new Chart(document.getElementById('chartStatus'), {
          type: 'pie',
          data: {
              labels: Object.keys(statusData),
              datasets: [{
                  data: Object.values(statusData),
                  backgroundColor: ['#ffc107', '#198754', '#0dcaf0', '#dc3545'],
              }]
          },
          options: { maintainAspectRatio: false }
      });

      // --- 2. CONFIGURAÇÃO GRÁFICO MENSAL ---
      const labelsMensal = {{ labels | tojson }};
      const valoresMensal = {{ valores | tojson }};
      new Chart(document.getElementById('chartMensal'), {
          type: 'bar',
          data: {
              labels: labelsMensal,
              datasets: [{
                  label: 'Quantidade',
                  data: valoresMensal,
                  backgroundColor: '#0d6efd',
                  borderWidth: 1
              }]
          },
          options: {
              maintainAspectRatio: false,
              scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
          }
      });

      // --- 3. CONFIGURAÇÃO GRÁFICO DE SETORES ---
      const setorData = {{ setor_counts | tojson }};
      const labelsSetores = Object.keys(setorData);
      const valoresSetores = Object.values(setorData);

      new Chart(document.getElementById('chartSetores'), {
          type: 'bar',
          data: {
              labels: labelsSetores.map(s => s ? s.toUpperCase() : "SEM SETOR"),
              datasets: [{
                  label: 'Total de Chamados',
                  data: valoresSetores,
                  backgroundColor: '#6610f2',
                  borderWidth: 1
              }]
          },
          options: {
              indexAxis: 'y', // Barras horizontais
              maintainAspectRatio: false,
              scales: {
                  x: { beginAtZero: true, ticks: { stepSize: 1 } }
              }
          }
      });
    </script>
  </body>
</html>
